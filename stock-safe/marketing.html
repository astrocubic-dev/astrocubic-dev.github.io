<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>주식 증권 금고</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; background: linear-gradient(180deg, #102019, #f7f1e6 54%); color: #17251f; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; line-height: 1.68; }
    main { max-width: 980px; margin: 0 auto; padding: 48px 22px 72px; }
    .hero { color: #fff7e6; padding: 42px 0 34px; }
    .eyebrow { color: #d9b56e; font-size: 13px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; }
    h1 { font-size: clamp(34px, 6vw, 58px); line-height: 1.08; margin: 10px 0 16px; }
    h2 { font-size: 24px; margin: 0 0 12px; }
    p, li { font-size: 16px; }
    .lead { max-width: 720px; font-size: 19px; color: rgba(255,247,230,.86); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; }
    .card { background: rgba(255,255,255,.72); border: 1px solid #d3c3a3; border-radius: 16px; padding: 24px; box-shadow: 0 16px 40px rgba(43,33,22,.12); }
    .button { display: inline-block; margin-top: 16px; padding: 12px 16px; border-radius: 999px; background: #b48949; color: #17251f; text-decoration: none; font-weight: 900; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="eyebrow">Stock Certificate Vault</div>
      <h1>주식 증권 금고</h1>
      <p class="lead">내 보유 주식을 고전 종이 주권처럼 보관하고, 수량과 평균 단가, 현재가를 한눈에 기록하는 개인용 주식 보관 앱입니다.</p>
      <a class="button" href="support.html">지원 문의</a>
    </section>

    <section class="grid" aria-label="주요 기능">
      <article class="card">
        <h2>종이 주권 보관</h2>
        <p>보유 종목을 고전 주권 디자인으로 시각화해 금고 안에 보관하듯 관리합니다.</p>
      </article>
      <article class="card">
        <h2>현재가 갱신</h2>
        <p>국내 상장 종목의 공개 시세를 기준으로 현재가 갱신을 시도하고, 수동 입력값도 함께 보존합니다.</p>
      </article>
      <article class="card">
        <h2>개인 기록 중심</h2>
        <p>종목 메모와 보유 정보를 기기 안에 기록합니다. 투자 자문이나 매매 추천 앱이 아닙니다.</p>
      </article>
    </section>
  </main>
</body>
</html>
