<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">천체망원경 협찬 광고 데모</title>
  <desc id="desc">별과 궤도 아래 삼각대 망원경이 놓인 1960년대 인쇄 광고풍 그림</desc>
  <rect width="720" height="360" fill="#102d38"/>
  <g fill="#d8b778" opacity=".9">
    <circle cx="95" cy="72" r="3"/><circle cx="170" cy="42" r="2"/><circle cx="615" cy="84" r="4"/><circle cx="538" cy="45" r="2"/>
    <path d="M38 118C194 18 492 14 686 106" fill="none" stroke="#d8b778" stroke-width="2"/>
  </g>
  <g transform="translate(400 80) rotate(-16)" stroke="#ead6a4" stroke-width="10" stroke-linecap="round">
    <path d="M0 40h170"/><path d="M28 22v36"/><circle cx="168" cy="40" r="20" fill="#b64a36"/>
  </g>
  <g stroke="#ead6a4" stroke-width="8" stroke-linecap="round"><path d="m492 154-70 148"/><path d="m492 154 68 148"/><path d="m492 154 4 148"/></g>
